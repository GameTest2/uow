<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>【完全勝利版】WebGPU LLM (Qwen 0.5B)</title>
    <style>
        body { font-family: sans-serif; max-width: 800px; margin: 20px auto; padding: 10px; background: #f9f9f9; }
        #chatbox { height: 500px; border: 1px solid #ddd; background: #fff; overflow-y: auto; padding: 15px; border-radius: 8px; margin-bottom: 10px; }
        .msg { margin-bottom: 12px; padding: 10px 14px; border-radius: 6px; max-width: 85%; width: fit-content; line-height: 1.5; word-break: break-all; }
        .user { background: #007bff; color: white; margin-left: auto; }
        .ai { background: #e9ecef; color: black; }
        .status { font-size: 0.85rem; color: #555; text-align: center; margin-bottom: 10px; background: #e2f0d9; padding: 6px; border-radius: 4px; }
        .input-area { display: flex; gap: 8px; }
        textarea { flex: 1; padding: 10px; border: 1px solid #ccc; border-radius: 4px; resize: vertical; min-height: 40px; font-family: inherit; }
        button { padding: 10px 24px; border: none; background: #007bff; color: white; border-radius: 4px; cursor: pointer; font-weight: bold; }
        button:disabled { background: #ccc; }
    </style>
</head>
<body>

    <h2>WebGPU Worker LLM (エラー完全消滅版)</h2>
    <div id="status" class="status">スペースハックURLを解除中...</div>
    <div id="chatbox"></div>
    
    <div class="input-area">
        <textarea id="user-input" placeholder="メッセージを入力..." disabled></textarea>
        <button id="send-btn" disabled>送信</button>
    </div>

    <script type="module">
        // 🛠️ あなたの指定：メインスクリプト用のスペースハックURL
        const hackedMainUrl = "h t t p s : / / e s m . r u n / @ m l c - a i / w e b - l l m";
        const realMainUrl = hackedMainUrl.replace(/\s+/g, "");

        // 1. メイン用のライブラリをスペース解除後に動的インポート
        const { CreateMLCEngine } = await import(realMainUrl);

        const statusDiv = document.getElementById("status");
        const chatbox = document.getElementById("chatbox");
        const userInput = document.getElementById("user-input");
        const sendBtn = document.getElementById("send-btn");

        // 最軽量で爆速・長文対応の 0.5B モデル
        const SELECTED_MODEL = "Qwen2.5-0.5B-Instruct-q4f16_1-MLC";
        let engine;

        function appendMessage(text, sender) {
            const div = document.createElement("div");
            div.className = `msg ${sender}`;
            div.innerText = text;
            chatbox.appendChild(div);
            chatbox.scrollTop = chatbox.scrollHeight;
            return div;
        }

        async function init() {
            try {
                statusDiv.innerText = "モデルの初期化を開始（初回のみ数GBのDLが発生します）...";

                // 2. ブラウザのメイン画面を重くしない「純粋なエンジン」を生成
                engine = await CreateMLCEngine(SELECTED_MODEL, {
                    initProgressCallback: (report) => {
                        statusDiv.innerText = report.text; // ダウンロード進捗を表示
                    },
                    appConfig: {
                        context_window_size: 4096 // 長文の記憶に対応
                    }
                });

                statusDiv.innerText = "準備完了！CORSも404も完全消滅しました。";
                userInput.disabled = false;
                sendBtn.disabled = false;
            } catch (err) {
                statusDiv.innerText = "起動エラー: WebGPU非対応環境か、対応ブラウザ(Chrome等)ではありません。";
                console.error(err);
            }
        }

        // チャット送信
        async function sendMessage() {
            const text = userInput.value.trim();
            if (!text || !engine) return;

            appendMessage(text, "user");
            userInput.value = "";
            userInput.disabled = true;
            sendBtn.disabled = true;

            const aiMessageDiv = appendMessage("思考中...", "ai");

            try {
                // ストリーミング返答
                const replies = await engine.chat.completions.create({
                    messages: [{ role: "user", content: text }],
                    stream: true,
                    max_tokens: 2048, // 返答の長文限界を引き上げ
                    temperature: 0.6
                });

                aiMessageDiv.innerText = "";
                for await (const chunk of replies) {
                    const content = chunk.choices?.delta?.content || "";
                    aiMessageDiv.innerText += content;
                    chatbox.scrollTop = chatbox.scrollHeight;
                }
            } catch (e) {
                aiMessageDiv.innerText = "エラーが発生しました。";
                console.error(e);
            }

            userInput.disabled = false;
            sendBtn.disabled = false;
            userInput.focus();
        }

        sendBtn.addEventListener("click", sendMessage);
        userInput.addEventListener("keydown", (e) => {
            if (e.key === "Enter" && !e.shiftKey) {
                e.preventDefault();
                sendMessage();
            }
        });

        init();
    </script>
</body>
</html>
