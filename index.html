<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>完全ローカル Web-LLM (Qwen 0.5B 超爆速版)</title>
    <style>
        body { font-family: sans-serif; max-width: 700px; margin: 20px auto; padding: 10px; background: #f5f5f5; color: #333; }
        #chatbox { height: 450px; border: 1px solid #ccc; background: #fff; overflow-y: auto; padding: 15px; border-radius: 8px; margin-bottom: 10px; }
        .msg { margin-bottom: 15px; padding: 10px 14px; border-radius: 6px; max-width: 85%; width: fit-content; line-height: 1.6; }
        .user { background: #007bff; color: white; margin-left: auto; }
        
        /* AIの返答エリア（マークダウン用スタイル） */
        .ai { background: #e9ecef; color: black; width: 100%; }
        .ai h1, .ai h2, .ai h3 { margin-top: 5px; margin-bottom: 5px; border-bottom: 1px solid #ccc; padding-bottom: 3px; }
        .ai strong { color: #d9383a; background: #fbf0f0; padding: 1px 4px; border-radius: 3px; font-weight: bold; }
        .ai code { background: #fee; color: #c7254e; padding: 2px 4px; border-radius: 4px; font-family: monospace; font-size: 0.9rem; }
        
        /* ``` で囲まれたコードブロックの黒背景スタイル */
        .ai pre { background: #2d3748; color: #f7fafc; padding: 12px; border-radius: 6px; overflow-x: auto; margin: 10px 0; }
        .ai pre code { background: transparent; color: inherit; padding: 0; font-size: 0.85rem; }

        .status { font-size: 0.85rem; color: #666; text-align: center; font-style: italic; margin-bottom: 10px; }
        .input-area { display: flex; gap: 8px; }
        textarea { flex: 1; padding: 10px; border: 1px solid #ccc; border-radius: 4px; resize: vertical; min-height: 40px; font-family: inherit; }
        button { padding: 10px 20px; border: none; background: #007bff; color: white; border-radius: 4px; cursor: pointer; font-weight: bold; }
        button:disabled { background: #ccc; }
    </style>
</head>
<body>

    <h2>WebGPU LLM Chat (超爆速長文チューニング)</h2>
    <div id="status" class="status">ハックURLからライブラリを復元中...</div>
    <div id="chatbox"></div>
    
    <div class="input-area">
        <textarea id="user-input" placeholder="WebGPU対応ブラウザでロード完了をお待ちください..." disabled></textarea>
        <button id="send-btn" disabled>送信</button>
    </div>

    <!-- あなた指定のスペースハックURL -->
    <script type="module">
        const hackedMarkedUrl = "h t t p s : / / c d n . j s d e l i v r . n e t / n p m / m a r k e d / m a r k e d . m i n . j s";
        const hackedWebLlmUrl = "h t t p s : / / e s m . r u n / @ m l c - a i / w e b - l l m";

        async function loadLibraries() {
            const realMarkedUrl = hackedMarkedUrl.replace(/\s+/g, "");
            await new Promise((resolve, reject) => {
                const script = document.createElement("script");
                script.src = realMarkedUrl;
                script.onload = resolve;
                script.onerror = () => reject(new Error("markedの読み込みに失敗しました"));
                document.head.appendChild(script);
            });

            const realWebLlmUrl = hackedWebLlmUrl.replace(/\s+/g, "");
            const module = await import(realWebLlmUrl);
            return module.CreateMLCEngine;
        }

        const statusDiv = document.getElementById("status");
        const chatbox = document.getElementById("chatbox");
        const userInput = document.getElementById("user-input");
        const sendBtn = document.getElementById("send-btn");

        const SELECTED_MODEL = "Qwen2.5-0.5B-Instruct-q4f16_1-MLC"; 
        let engine;
        
        const conversationHistory = [
            { 
                role: "system", 
                content: "あなたは詳細に解説してくれる親切なAIです。ユーザーの質問には、必ず「非常に長い文章（詳細な長文）」で網羅的に解説してください。また、文章を分かりやすく構造化するために、見出し(#)、重要キーワードの太字(**)、コードブロック(```)などのマークダウン記法を多用して出力してください。" 
            }
        ];

        function appendMessage(text, sender) {
            const div = document.createElement("div");
            div.className = `msg ${sender}`;
            div.innerText = text;
            chatbox.appendChild(div);
            chatbox.scrollTop = chatbox.scrollHeight;
            return div;
        }

        async function init() {
            try {
                const CreateMLCEngine = await loadLibraries();

                statusDiv.innerText = `モデル「${SELECTED_MODEL}」を初期化中 (初回は数GBダウンロードします)...`;
                
                engine = await CreateMLCEngine(SELECTED_MODEL, {
                    initProgressCallback: (report) => {
                        statusDiv.innerText = report.text;
                    }
                }, {
                    context_window_size: 4096 // 過去の会話をたくさん覚えられるように拡張
                });

                statusDiv.innerText = "準備完了！モデルはブラウザ内にロードされました。";
                userInput.disabled = false;
                userInput.placeholder = "メッセージを入力...";
                sendBtn.disabled = false;
            } catch (err) {
                statusDiv.innerText = "エラー発生: " + err.message;
                console.error(err);
            }
        }

        async function sendMessage() {
            const text = userInput.value.trim();
            if (!text || !engine) return;

            appendMessage(text, "user");
            userInput.value = "";
            userInput.disabled = true;
            sendBtn.disabled = true;

            conversationHistory.push({ role: "user", content: text });

            const aiMessageDiv = document.createElement("div");
            aiMessageDiv.className = "msg ai";
            aiMessageDiv.innerText = "思考中...";
            chatbox.appendChild(aiMessageDiv);

            try {
                const replies = await engine.chat.completions.create({
                    messages: conversationHistory,
                    stream: true,
                    max_tokens: 3072 // ⚡️最大出力数をさらに引き上げて超長文に対応
                });

                let rawAiText = "";
                aiMessageDiv.innerText = "";

                // ⚡️描画速度を爆速にするためのタイマー仕掛け（スロットリング）
                let lastUpdateTime = 0;
                const updateInterval = 100; // 100ミリ秒ごとに画面を更新する

                for await (const chunk of replies) {
                    const content = chunk.choices?.delta?.content || "";
                    rawAiText += content;
                    
                    const now = Date.now();
                    // 100ミリ秒経過している場合のみ画面を書き換える
                    if (now - lastUpdateTime > updateInterval) {
                        aiMessageDiv.innerHTML = window.marked.parse(rawAiText);
                        chatbox.scrollTop = chatbox.scrollHeight;
                        lastUpdateTime = now;
                    }
                }

                // 🚀 ループ終了後に、残りの文字をすべて最終レンダリング
                aiMessageDiv.innerHTML = window.marked.parse(rawAiText);
                chatbox.scrollTop = chatbox.scrollHeight;

                conversationHistory.push({ role: "assistant", content: rawAiText });

            } catch (e) {
                aiMessageDiv.innerText = "エラーが起きました。";
                console.error(e);
            }

            userInput.disabled = false;
            sendBtn.disabled = false;
            userInput.focus();
        }

        sendBtn.addEventListener("click", sendMessage);
        userInput.addEventListener("keydown", (e) => { 
            if (e.key === "Enter" && !e.shiftKey) {
                e.preventDefault();
                sendMessage(); 
            }
        });

        init();
    </script>
</body>
</html>
