<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>爆速 Web-LLM (Worker版)</title>
    <style>
        body { font-family: sans-serif; max-width: 800px; margin: 20px auto; padding: 10px; background: #f9f9f9; }
        #chatbox { height: 500px; border: 1px solid #ddd; background: #fff; overflow-y: auto; padding: 15px; border-radius: 8px; margin-bottom: 10px; }
        .msg { margin-bottom: 12px; padding: 10px 14px; border-radius: 6px; max-width: 85%; width: fit-content; line-height: 1.5; word-break: break-all; }
        .user { background: #007bff; color: white; margin-left: auto; }
        .ai { background: #e9ecef; color: black; }
        .status { font-size: 0.85rem; color: #555; text-align: center; margin-bottom: 10px; background: #e2f0d9; padding: 6px; border-radius: 4px; }
        .input-area { display: flex; gap: 8px; }
        textarea { flex: 1; padding: 10px; border: 1px solid #ccc; border-radius: 4px; resize: vertical; min-height: 40px; font-family: inherit; }
        button { padding: 10px 24px; border: none; background: #007bff; color: white; border-radius: 4px; cursor: pointer; font-weight: bold; }
        button:disabled { background: #ccc; }
    </style>
</head>
<body>

    <h2>WebGPU Worker LLM (Qwen 0.5B 高速版)</h2>
    <div id="status" class="status">バックグラウンドAIを起動中...</div>
    <div id="chatbox"></div>
    
    <div class="input-area">
        <textarea id="user-input" placeholder="長文入力も可能です..." disabled></textarea>
        <button id="send-btn" disabled>送信</button>
    </div>

    <script type="module">
        // 1. Web Workerコードを文字列として定義（別スレッドでAIを動かす）
        const workerCode = `
            import { CreateCreateMLCEngine, CreateMLCEngine } from "https://esm.run";

            let engine;
            const SELECTED_MODEL = "Qwen2.5-0.5B-Instruct-q4f16_1-MLC";

            self.onmessage = async (e) => {
                const { type, text } = e.data;

                if (type === "init") {
                    try {
                        engine = await CreateMLCEngine(SELECTED_MODEL, {
                            initProgressCallback: (report) => {
                                self.postMessage({ type: "progress", text: report.text });
                            },
                            // 長文（コンテキスト窓）の拡張設定
                            appConfig: {
                                context_window_size: 4096 
                            }
                        });
                        self.postMessage({ type: "ready" });
                    } catch (err) {
                        self.postMessage({ type: "error", text: err.message });
                    }
                }

                if (type === "clear") {
                    if (engine) await engine.resetChat();
                }

                if (type === "send") {
                    try {
                        const replies = await engine.chat.completions.create({
                            messages: [{ role: "user", content: text }],
                            stream: true,
                            max_tokens: 2048, // 返答の最大文字数を拡張
                            temperature: 0.6  // 乱数の調整（長文でも破綻しにくくする）
                        });

                        for await (const chunk of replies) {
                            const content = chunk.choices?.delta?.content || "";
                            self.postMessage({ type: "chunk", text: content });
                        }
                        self.postMessage({ type: "done" });
                    } catch (err) {
                        self.postMessage({ type: "error", text: err.message });
                    }
                }
            };
        `;

        // 2. 文字列からBlobを作成し、Workerとして起動
        const blob = new Blob([workerCode], { type: "application/javascript" });
        const worker = new Worker(URL.createObjectURL(blob), { type: "module" });

        const statusDiv = document.getElementById("status");
        const chatbox = document.getElementById("chatbox");
        const userInput = document.getElementById("user-input");
        const sendBtn = document.getElementById("send-btn");

        let currentAiMsgDiv = null;

        function appendMessage(text, sender) {
            const div = document.createElement("div");
            div.className = `msg ${sender}`;
            div.innerText = text;
            chatbox.appendChild(div);
            chatbox.scrollTop = chatbox.scrollHeight;
            return div;
        }

        // 3. Workerからのメッセージ受信処理
        worker.onmessage = (e) => {
            const { type, text } = e.data;

            if (type === "progress") {
                statusDiv.innerText = text;
            }
            if (type === "ready") {
                statusDiv.innerText = "準備完了！WorkerスレッドでAIが高速動作中。";
                userInput.disabled = false;
                sendBtn.disabled = false;
            }
            if (type === "chunk") {
                if (currentAiMsgDiv.innerText === "思考中...") {
                    currentAiMsgDiv.innerText = "";
                }
                currentAiMsgDiv.innerText += text;
                chatbox.scrollTop = chatbox.scrollHeight;
            }
            if (type === "done") {
                userInput.disabled = false;
                sendBtn.disabled = false;
                userInput.focus();
            }
            if (type === "error") {
                statusDiv.innerText = "エラー: " + text;
                if (currentAiMsgDiv) currentAiMsgDiv.innerText = "エラーが発生しました。";
                userInput.disabled = false;
                sendBtn.disabled = false;
            }
        };

        // 4. 送信処理
        function sendMessage() {
            const text = userInput.value.trim();
            if (!text) return;

            appendMessage(text, "user");
            userInput.value = "";
            userInput.disabled = true;
            sendBtn.disabled = true;

            currentAiMsgDiv = appendMessage("思考中...", "ai");

            // Workerへ処理を丸投げ
            worker.postMessage({ type: "send", text: text });
        }

        sendBtn.addEventListener("click", sendMessage);
        userInput.addEventListener("keydown", (e) => {
            if (e.key === "Enter" && !e.shiftKey) {
                e.preventDefault();
                sendMessage();
            }
        });

        // 初期化コマンドを送信
        worker.postMessage({ type: "init" });
    </script>
</body>
</html>
