<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>プレミアム AI チャットダッシュボード</title>
    <style>
        :root {
            --bg-main: #131314;
            --bg-sidebar: #1e1f20;
            --bg-chat: #1e1f20;
            --bg-user: #2b2a33;
            --text-main: #e3e3e3;
            --border-color: #444746;
            --accent-color: #a8c7fa;
        }
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { font-family: sans-serif; background: var(--bg-main); color: var(--text-main); display: flex; height: 100vh; overflow: hidden; }
        #sidebar { width: 260px; background: var(--bg-sidebar); border-right: 1px solid var(--border-color); display: flex; flex-direction: column; padding: 15px; gap: 15px; }
        .new-btn { background: #2d2f31; border: 1px solid var(--border-color); color: var(--text-main); padding: 12px; border-radius: 20px; font-weight: bold; cursor: pointer; text-align: center; font-size: 0.9rem; }
        .new-btn:hover { background: #3c3d3f; }
        .history-list { flex: 1; overflow-y: auto; display: flex; flex-direction: column; gap: 8px; font-size: 0.85rem; color: #c4c7c5; }
        #main-container { flex: 1; display: flex; flex-direction: column; height: 100vh; position: relative; }
        #chatbox { flex: 1; overflow-y: auto; padding: 30px 20px; display: flex; flex-direction: column; gap: 24px; max-width: 800px; width: 100%; margin: 0 auto; }
        .msg { padding: 16px 20px; border-radius: 12px; max-width: 90%; width: fit-content; line-height: 1.6; font-size: 0.95rem; }
        .user { background: var(--bg-user); align-self: flex-end; color: #fff; }
        .ai { background: transparent; align-self: flex-start; width: 100%; border-bottom: 1px solid #2d2f31; border-radius: 0; padding-left: 0; padding-right: 0; }
        .ai h1, .ai h2, .ai h3 { margin: 15px 0 10px 0; border-bottom: 1px solid var(--border-color); padding-bottom: 5px; }
        .ai strong { color: var(--accent-color); font-weight: bold; }
        .ai code { background: #282a36; color: #ff79c6; padding: 3px 6px; border-radius: 4px; font-family: monospace; font-size: 0.9rem; }
        .ai pre { background: #1e1e1e; padding: 16px; border-radius: 8px; overflow-x: auto; margin: 12px 0; border: 1px solid var(--border-color); }
        .ai pre code { background: transparent; color: #f8f8f2; padding: 0; font-size: 0.85rem; }
        .input-outer { width: 100%; max-width: 800px; margin: 0 auto; padding: 0 20px 24px 20px; background: var(--bg-main); }
        .input-area { display: flex; gap: 10px; background: #202124; border: 1px solid var(--border-color); border-radius: 28px; padding: 8px 16px; align-items: flex-end; }
        textarea { flex: 1; background: transparent; border: none; color: var(--text-main); resize: none; height: 24px; max-height: 200px; font-family: inherit; font-size: 1rem; outline: none; padding-top: 2px; }
        button { background: #303134; border: none; color: var(--accent-color); width: 36px; height: 36px; border-radius: 50%; cursor: pointer; font-weight: bold; font-size: 1.1rem; display: flex; align-items: center; justify-content: center; }
        button:disabled { color: #5f6368; cursor: not-allowed; }
        .status { font-size: 0.75rem; color: #9aa0a6; text-align: center; margin-top: 8px; }
    </style>
</head>
<body>

    <div id="sidebar">
        <div class="new-btn" id="clear-btn">🔄 会話をリセット</div>
        <div class="history-list">
            <div style="opacity: 0.5; padding: 10px; text-align: center;">会話履歴</div>
        </div>
    </div>

    <div id="main-container">
        <div id="chatbox"></div>
        <div class="input-outer">
            <div class="input-area">
                <textarea id="user-input" placeholder="AIに高度なHTMLコードを書かせてみよう..." disabled></textarea>
                <button id="send-btn" disabled>➔</button>
            </div>
            <div id="status" class="status">ハックURLからシステムを復元中...</div>
        </div>
    </div>

    <script type="module">
        const hackedMarkedUrl = "h t t p s : / / c d n . j s d e l i v r . n e t / n p m / m a r k e d / m a r k e d . m i n . j s";
        const hackedWebLlmUrl = "h t t p s : / / e s m . r u n / @ m l c - a i / w e b - l l m";

        async function loadLibraries() {
            const realMarkedUrl = hackedMarkedUrl.replace(/\s+/g, "");
            await new Promise((resolve) => {
                const script = document.createElement("script");
                script.src = realMarkedUrl;
                script.onload = resolve;
                document.head.appendChild(script);
            });
            const realWebLlmUrl = hackedWebLlmUrl.replace(/\s+/g, "");
            const module = await import(realWebLlmUrl);
            return module.CreateMLCEngine;
        }

        const statusDiv = document.getElementById("status");
        const chatbox = document.getElementById("chatbox");
        const userInput = document.getElementById("user-input");
        const sendBtn = document.getElementById("send-btn");
        const clearBtn = document.getElementById("clear-btn");

        const SELECTED_MODEL = "Qwen2.5-0.5B-Instruct-q4f16_1-MLC"; 
        let engine;
        
        // 🛠️ 変更点1：プロンプトを「コードを書いて」と言われた時だけに限定する厳格な命令に修正
        let conversationHistory = [
            { 
                role: "system", 
                content: "あなたは天才エンジニアAIです。ユーザーから明確に『コードを書いて』と言われた場合のみ、概念の基礎解説や余計な挨拶は一切省き、実用的で完全に動作する具体的なコードブロック(```)だけを長文で出力してください。それ以外の普通の会話の時は、コードブロックを使わずに普通に短く回答してください。" 
            }
        ];

        function appendMessage(text, sender) {
            const div = document.createElement("div");
            div.className = `msg ${sender}`;
            div.innerText = text;
            chatbox.appendChild(div);
            chatbox.scrollTop = chatbox.scrollHeight;
            return div;
        }

        async function init() {
            try {
                const CreateMLCEngine = await loadLibraries();
                statusDiv.innerText = "WebGPU上で頭脳を初期化中...";
                
                // 🛠️ 変更点2：モデルの限界を超えない安全な上限「4096」にジャストフィット
                engine = await CreateMLCEngine(SELECTED_MODEL, {
                    initProgressCallback: (report) => { statusDiv.innerText = report.text; }
                }, { context_window_size: 4096 });

                statusDiv.innerText = "Qwen2.5-0.5B 起動完了。";
                userInput.disabled = false;
                sendBtn.disabled = false;
            } catch (err) {
                statusDiv.innerText = "エラー: " + err.message;
            }
        }

        async function sendMessage() {
            const text = userInput.value.trim();
            if (!text || !engine) return;

            appendMessage(text, "user");
            userInput.value = "";
            userInput.style.height = "24px";

            conversationHistory.push({ role: "user", content: text });
            const aiMessageDiv = appendMessage("思考中...", "ai");

            try {
                // 🛠️ 変更点3：4096の器に合わせて、最大の出力トークンを「2048」に最適化（絶対にクラッシュしません）
                const replies = await engine.chat.completions.create({
                    messages: conversationHistory,
                    stream: true,
                    max_tokens: 2048
                });

                let rawAiText = "";
                aiMessageDiv.innerText = "";

                for await (const chunk of replies) {
                    const content = chunk.choices?.delta?.content || "";
                    rawAiText += content;
                    
                    aiMessageDiv.innerHTML = window.marked.parse(rawAiText);
                    chatbox.scrollTop = chatbox.scrollHeight;
                }
                
                conversationHistory.push({ role: "assistant", content: rawAiText });
            } catch (e) {
                aiMessageDiv.innerText = "エラーが発生しました。設定値がオーバーフローした可能性があります。";
            }

            userInput.disabled = false;
            sendBtn.disabled = false;
            userInput.focus();
        }

        clearBtn.addEventListener("click", () => {
            // リセット時も新しいシステムプロンプトを適用
            conversationHistory = [{ role: "system", content: "あなたは天才エンジニアAIです。ユーザーから明確に『コードを書いて』と言われた場合のみ、概念の基礎解説や余計な挨拶は一切省き、実用的で完全に動作する具体的なコードブロック(```)だけを長文で出力してください。それ以外の普通の会話の時は、コードブロックを使わずに普通に短く回答してください。" }];
            chatbox.innerHTML = "";
            appendMessage("会話履歴をリセットしました。次の指示をどうぞ！", "ai");
        });

        sendBtn.addEventListener("click", sendMessage);
        userInput.addEventListener("keydown", (e) => { 
            if (e.key === "Enter" && !e.shiftKey) { e.preventDefault(); sendMessage(); }
        });
        userInput.addEventListener("input", function() {
            this.style.height = "24px";
            this.style.height = this.scrollHeight - 10 + "px";
        });

        init();
    </script>
</body>
</html>
