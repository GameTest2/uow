<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>完全ローカル Web-LLM (Qwen 0.5B ハック版)</title>
    <style>
        body { font-family: sans-serif; max-width: 800px; margin: 20px auto; padding: 10px; background: #f5f5f5; }
        /* 長文が見やすいようにチャットボックスを広げました */
        #chatbox { height: 500px; border: 1px solid #ccc; background: #fff; overflow-y: auto; padding: 15px; border-radius: 8px; margin-bottom: 10px; }
        .msg { margin-bottom: 10px; padding: 10px 14px; border-radius: 6px; max-width: 85%; width: fit-content; line-height: 1.5; }
        .user { background: #007bff; color: white; margin-left: auto; }
        .ai { background: #e9ecef; color: black; }
        .status { font-size: 0.85rem; color: #666; text-align: center; font-style: italic; margin-bottom: 10px; }
        .input-area { display: flex; gap: 8px; }
        /* 長文を打ち込めるようにinputからtextareaに変更 */
        textarea { flex: 1; padding: 10px; border: 1px solid #ccc; border-radius: 4px; resize: vertical; min-height: 40px; font-family: inherit; }
        button { padding: 10px 24px; border: none; background: #007bff; color: white; border-radius: 4px; cursor: pointer; font-weight: bold; }
        button:disabled { background: #ccc; }
    </style>
</head>
<body>

    <h2>WebGPU LLM Chat (Qwen 0.5B 長文・高速版)</h2>
    <div id="status" class="status">ハックURLからライブラリを復元中...</div>
    <div id="chatbox"></div>
    
    <div class="input-area">
        <textarea id="user-input" placeholder="WebGPU対応ブラウザでロード完了をお待ちください..." disabled></textarea>
        <button id="send-btn" disabled>送信</button>
    </div>

    <!-- 通常のスクリプトタグ内で実行 -->
    <script>
        const statusDiv = document.getElementById("status");
        const chatbox = document.getElementById("chatbox");
        const userInput = document.getElementById("user-input");
        const sendBtn = document.getElementById("send-btn");

        const SELECTED_MODEL = "Qwen2.5-0.5B-Instruct-q4f16_1-MLC"; 
        let engine;

        // メッセージを画面に追加する関数
        function appendMessage(text, sender) {
            const div = document.createElement("div");
            div.className = `msg ${sender}`;
            div.innerText = text;
            chatbox.appendChild(div);
            chatbox.scrollTop = chatbox.scrollHeight;
            return div;
        }

        // 🛠️ あなたの指定：スペース付きのURL文字列
        const hackedUrl = "h t t p s : / / e s m . r u n / @ m l c - a i / w e b - l l m";

        // 🛠️ どっかでスペースを除去して、安全なスクリプトタグとして動的ロードする関数
        function injectLibrary(hackedStr) {
            return new Promise((resolve, reject) => {
                const realUrl = hackedStr.replace(/\s+/g, ""); // スペースを全除去
                
                const script = document.createElement("script");
                script.type = "module";
                // インラインスクリプト経由でグローバル(window)にCreateMLCEngineをエクスポートする仕掛け
                script.innerHTML = `
                    import { CreateMLCEngine } from "${realUrl}";
                    window.CreateMLCEngine = CreateMLCEngine;
                    window.dispatchEvent(new Event("webllm-ready"));
                `;
                script.onerror = () => reject(new Error("ライブラリの注入に失敗しました"));
                document.head.appendChild(script);

                // ロード完了イベントを待つ
                window.addEventListener("webllm-ready", () => resolve(), { once: true });
            });
        }

        async function init() {
            try {
                // スペース除去ハックを実行
                await injectLibrary(hackedUrl);

                statusDiv.innerText = `モデル「${SELECTED_MODEL}」を初期化中 (初回は数GBダウンロードします)...`;
                
                // 動的展開された本物の CreateMLCEngine を使用
                engine = await window.CreateMLCEngine(SELECTED_MODEL, {
                    initProgressCallback: (report) => {
                        statusDiv.innerText = report.text; // ダウンロード進捗をリアルタイム表示
                    },
                    // ⚡️記憶容量（長文対応）を4096トークンへ大幅に引き上げ
                    appConfig: {
                        context_window_size: 4096
                    }
                });

                statusDiv.innerText = "準備完了！モデルはブラウザ内にロードされました。";
                userInput.disabled = false;
                userInput.placeholder = "メッセージを入力...";
                sendBtn.disabled = false;
            } catch (err) {
                statusDiv.innerText = "エラー発生: " + err.message;
                console.error(err);
            }
        }

        // チャット送信処理
        async function sendMessage() {
            const text = userInput.value.trim();
            if (!text || !engine) return;

            appendMessage(text, "user");
            userInput.value = "";
            userInput.disabled = true;
            sendBtn.disabled = true;

            const aiMessageDiv = appendMessage("思考中...", "ai");

            try {
                // OpenAI互換のAPI構造で文字をストリーミング生成
                const replies = await engine.chat.completions.create({
                    messages: [{ role: "user", content: text }],
                    stream: true,
                    max_tokens: 2048, // ⚡️AIが一度に返せる最大文字数を2048文字まで大幅に拡張
                    temperature: 0.6  // 長文でも破綻しにくい適度な創造性
                });

                aiMessageDiv.innerText = "";
                for await (const chunk of replies) {
                    // あなたの動いたコードにあった元の [0] 指定に戻して確実性を確保
                    const content = chunk.choices[0]?.delta?.content || "";
                    aiMessageDiv.innerText += content;
                    chatbox.scrollTop = chatbox.scrollHeight; // ⚡️1文字出るごとに自動で最下部へ爆速スクロール
                }
            } catch (e) {
                aiMessageDiv.innerText = "エラーが起きました。";
                console.error(e);
            }

            userInput.disabled = false;
            sendBtn.disabled = false;
            userInput.focus();
        }

        sendBtn.addEventListener("click", sendMessage);
        
        // TextAreaになったので、Enterキーで送信、Shift+Enterで改行できるように調整
        userInput.addEventListener("keydown", (e) => { 
            if (e.key === "Enter" && !e.shiftKey) {
                e.preventDefault();
                sendMessage(); 
            }
        });

        // スタート
        init();
    </script>
</body>
</html>
