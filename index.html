<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>【最終解決版】爆速 Web-LLM (Qwen 0.5B)</title>
    <style>
        body { font-family: sans-serif; max-width: 800px; margin: 20px auto; padding: 10px; background: #f9f9f9; }
        #chatbox { height: 500px; border: 1px solid #ddd; background: #fff; overflow-y: auto; padding: 15px; border-radius: 8px; margin-bottom: 10px; }
        .msg { margin-bottom: 12px; padding: 10px 14px; border-radius: 6px; max-width: 85%; width: fit-content; line-height: 1.5; word-break: break-all; }
        .user { background: #007bff; color: white; margin-left: auto; }
        .ai { background: #e9ecef; color: black; }
        .status { font-size: 0.85rem; color: #555; text-align: center; margin-bottom: 10px; background: #e2f0d9; padding: 6px; border-radius: 4px; }
        .input-area { display: flex; gap: 8px; }
        textarea { flex: 1; padding: 10px; border: 1px solid #ccc; border-radius: 4px; resize: vertical; min-height: 40px; font-family: inherit; }
        button { padding: 10px 24px; border: none; background: #007bff; color: white; border-radius: 4px; cursor: pointer; font-weight: bold; }
        button:disabled { background: #ccc; }
    </style>
</head>
<body>

    <h2>WebGPU Worker LLM (検証完全クリア版)</h2>
    <div id="status" class="status">ハックURLからライブラリを復元中...</div>
    <div id="chatbox"></div>
    
    <div class="input-area">
        <textarea id="user-input" placeholder="メッセージを入力..." disabled></textarea>
        <button id="send-btn" disabled>送信</button>
    </div>

    <script>
        const statusDiv = document.getElementById("status");
        const chatbox = document.getElementById("chatbox");
        const userInput = document.getElementById("user-input");
        const sendBtn = document.getElementById("send-btn");

        const SELECTED_MODEL = "Qwen2.5-0.5B-Instruct-q4f16_1-MLC";
        let client;
        let currentAiMsgDiv = null;

        function appendMessage(text, sender) {
            const div = document.createElement("div");
            div.className = `msg ${sender}`;
            div.innerText = text;
            chatbox.appendChild(div);
            chatbox.scrollTop = chatbox.scrollHeight;
            return div;
        }

        // スクリプトタグを動的に生成して、ブラウザに直接webllmオブジェクトを展開させる関数
        function loadScript(hackedUrl) {
            return new Promise((resolve, reject) => {
                // 🛠️ スペース除去ハック
                const realUrl = hackedUrl.replace(/\s+/g, "");
                const script = document.createElement("script");
                script.src = realUrl;
                script.onload = () => resolve();
                script.onerror = () => reject(new Error("スクリプトの読み込みに失敗しました"));
                document.head.appendChild(script);
            });
        }

        async function init() {
            try {
                statusDiv.innerText = "メイン用のWeb-LLMを読み込み中...";

                // 🛠️ 1. ブラウザに直接ChatWorkerClientを認識させる、世界中で一番安定したUMD配信URL（もちろんスペースハック化）
                const hackedLibUrl = "h t t p s : / / c d n . j s d e l i v r . n e t / n p m / @ m l c - a i / w e b - l l m @ 0 . 2 . 7 4 / d i s t / w e b - l l m . j s";
                await loadScript(hackedLibUrl);

                // グローバルに展開された「本物の」webllmを取得
                const WebLLMLib = window.webllm;
                if (!WebLLMLib || !WebLLMLib.ChatWorkerClient) {
                    throw new Error("ライブラリの解析に失敗しました。構造が異常です。");
                }

                statusDiv.innerText = "Worker用のソースコードを取得中...";

                // 🛠️ 2. Worker内でも全く同じUMDライブラリを使い回すため、テキストとしてフェッチ
                const realLibUrl = hackedLibUrl.replace(/\s+/g, "");
                const response = await fetch(realLibUrl);
                if (!response.ok) throw new Error("ネットワークエラー: " + response.status);
                const webllmCodeText = await response.text();

                // Worker内部用のコードを1枚に固める
                // グローバルな「webllm.ChatWorkerHandler」をそのまま実行させます
                const workerRawCode = `
                    ${webllmCodeText}
                    if (self.webllm && self.webllm.ChatWorkerHandler) {
                        const handler = new self.webllm.ChatWorkerHandler();
                        self.onmessage = (e) => { handler.onmessage(e); };
                    } else {
                        throw new Error("Worker内部でChatWorkerHandlerが見つかりません");
                    }
                `;

                // 3. スクリプトをBase64化してCORS制限を踏み潰す
                const base64Code = btoa(unescape(encodeURIComponent(workerRawCode)));
                const dataUrl = "data:application/javascript;base64," + base64Code;

                // 同一ドメインの「データスクリプト」としてWorkerを起動
                const worker = new Worker(dataUrl);

                // ついに「ChatWorkerClient」が正常な関数として完璧にバインドされます！
                client = new WebLLMLib.ChatWorkerClient(worker);

                client.setInitProgressCallback((report) => {
                    statusDiv.innerText = report.text;
                });

                // 長文用にコンテキストを拡張してロード
                await client.reload(SELECTED_MODEL, {
                    appConfig: { context_window_size: 4096 }
                });

                statusDiv.innerText = "準備完了！CORSもコンストラクタエラーも完全に絶滅しました。";
                userInput.disabled = false;
                sendBtn.disabled = false;
            } catch (err) {
                statusDiv.innerText = "起動エラー: " + err.message;
                console.error(err);
            }
        }

        async function sendMessage() {
            const text = userInput.value.trim();
            if (!text || !client) return;

            appendMessage(text, "user");
            userInput.value = "";
            userInput.disabled = true;
            sendBtn.disabled = true;

            currentAiMsgDiv = appendMessage("思考中...", "ai");

            try {
                const replies = await client.chat.completions.create({
                    messages: [{ role: "user", content: text }],
                    stream: true,
                    max_tokens: 2048,
                    temperature: 0.6
                });

                currentAiMsgDiv.innerText = "";
                for await (const chunk of replies) {
                    const content = chunk.choices?.delta?.content || "";
                    currentAiMsgDiv.innerText += content;
                    chatbox.scrollTop = chatbox.scrollHeight;
                }
            } catch (e) {
                currentAiMsgDiv.innerText = "エラーが発生しました。";
                console.error(e);
            }

            userInput.disabled = false;
            sendBtn.disabled = false;
            userInput.focus();
        }

        sendBtn.addEventListener("click", sendMessage);
        userInput.addEventListener("keydown", (e) => {
            if (e.key === "Enter" && !e.shiftKey) {
                e.preventDefault();
                sendMessage();
            }
        });

        // 起動
        init();
    </script>
</body>
</html>
