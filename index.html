<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>完全ローカル Web-LLM (Qwen 0.5B)</title>
    <style>
        body { font-family: sans-serif; max-width: 600px; margin: 20px auto; padding: 10px; background: #f5f5f5; }
        #chatbox { height: 400px; border: 1px solid #ccc; background: #fff; overflow-y: auto; padding: 15px; border-radius: 8px; margin-bottom: 10px; }
        .msg { margin-bottom: 10px; padding: 8px 12px; border-radius: 6px; max-width: 80%; width: fit-content; }
        .user { background: #007bff; color: white; margin-left: auto; }
        .ai { background: #e9ecef; color: black; }
        .status { font-size: 0.85rem; color: #666; text-align: center; font-style: italic; margin-bottom: 10px; }
        .input-area { display: flex; gap: 8px; }
        input { flex: 1; padding: 10px; border: 1px solid #ccc; border-radius: 4px; }
        button { padding: 10px 20px; border: none; background: #007bff; color: white; border-radius: 4px; cursor: pointer; }
        button:disabled { background: #ccc; }
    </style>
</head>
<body>

    <h2>WebGPU LLM Chat (0.5B)</h2>
    <div id="status" class="status">ライブラリを読み込み中...</div>
    <div id="chatbox"></div>
    
    <div class="input-area">
        <input type="text" id="user-input" placeholder="WebGPU対応ブラウザでロード完了をお待ちください..." disabled>
        <button id="send-btn" disabled>送信</button>
    </div>

    <!-- 正しいモジュールCDNパスを指定 -->
    <script type="module">
        import { CreateMLCEngine } from "https://esm.run/@mlc-ai/web-llm";

        const statusDiv = document.getElementById("status");
        const chatbox = document.getElementById("chatbox");
        const userInput = document.getElementById("user-input");
        const sendBtn = document.getElementById("send-btn");

        // 今回ターゲットにする最軽量・高性能な 0.5B モデル
        const SELECTED_MODEL = "Qwen2.5-0.5B-Instruct-q4f16_1-MLC"; 

        let engine;

        // メッセージを画面に追加する関数
        function appendMessage(text, sender) {
            const div = document.createElement("div");
            div.className = `msg ${sender}`;
            div.innerText = text;
            chatbox.appendChild(div);
            chatbox.scrollTop = chatbox.scrollHeight;
        }

        async function init() {
            try {
                statusDiv.innerText = `モデル「${SELECTED_MODEL}」を初期化中 (初回は数GBダウンロードします)...`;
                
                // 🛠️ 変更点1：AIエンジンの記憶容量（コンテキスト窓）を4096トークンに拡張
                engine = await CreateMLCEngine(SELECTED_MODEL, {
                    initProgressCallback: (report) => {
                        statusDiv.innerText = report.text; // ダウンロード進捗をリアルタイム表示
                    }
                }, {
                    context_window_size: 4096
                });

                statusDiv.innerText = "準備完了！モデルはブラウザ内にロードされました。";
                userInput.disabled = false;
                userInput.placeholder = "メッセージを入力...";
                sendBtn.disabled = false;
            } catch (err) {
                statusDiv.innerText = "エラー発生: WebGPU非対応のブラウザか、非対応のグラフィック環境です。";
                console.error(err);
            }
        }

        // チャット送信処理
        async function sendMessage() {
            const text = userInput.value.trim();
            if (!text || !engine) return;

            appendMessage(text, "user");
            userInput.value = "";
            userInput.disabled = true;
            sendBtn.disabled = true;

            // AIの返答用枠を先に作成
            const aiMessageDiv = document.createElement("div");
            aiMessageDiv.className = "msg ai";
            aiMessageDiv.innerText = "思考中...";
            chatbox.appendChild(aiMessageDiv);

            try {
                // OpenAI互換のAPI構造で文字をストリーミング生成
                // 🛠️ 変更点2：AIが一度に出力できる最大文字数（max_tokens）を2048まで大幅に拡張
                const replies = await engine.chat.completions.create({
                    messages: [{ role: "user", content: text }],
                    stream: true,
                    max_tokens: 2048
                });

                aiMessageDiv.innerText = "";
                for await (const chunk of replies) {
                    const content = chunk.choices[0]?.delta?.content || "";
                    aiMessageDiv.innerText += content;
                    
                    // 🛠️ 変更点3：文字が出るたびに毎回最下部までスクロールさせ、体感速度を爆速化
                    chatbox.scrollTop = chatbox.scrollHeight;
                }
            } catch (e) {
                aiMessageDiv.innerText = "エラーが起きました。";
                console.error(e);
            }

            userInput.disabled = false;
            sendBtn.disabled = false;
            userInput.focus();
        }

        sendBtn.addEventListener("click", sendMessage);
        userInput.addEventListener("keypress", (e) => { if (e.key === "Enter") sendMessage(); });

        // ページ読み込み時に初期化スタート
        init();
    </script>
</body>
</html>
